name: invrt

project_files:
  - invrt-build/
  - docker-compose.invrt.yaml
  - commands/host/invrt-profile
  - commands/host/invrt-device
  - commands/host/invrt-configure
  - commands/web/invrt-environment
  - commands/host/invrt-setup
  - commands/host/invrt-teardown
  - commands/host/invrt-capture
  - commands/host/invrt-test

ddev_version_constraint: '>= v1.24.3'

post_install_actions:
 - test -d ./.invrt || mkdir -p ./.invrt
